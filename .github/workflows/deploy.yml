name: Build & deploy study notes

# Runs on every push to main (and can be triggered by hand). It rebuilds the
# navigation manifest from the content/ folder, then publishes the whole site
# to GitHub Pages. You never edit code to add notes — just add HTML files and push.
on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Let a newer push cancel an in-progress deploy.
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Regenerate navigation manifest from content/
        run: node tools/build-manifest.mjs

      - name: Apply Idasara branding (logo + copyright) to all pages
        run: node tools/apply-branding.mjs

      - uses: actions/configure-pages@v5

      - name: Upload site artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
